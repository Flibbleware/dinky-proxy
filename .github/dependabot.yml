version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Keep @types/node aligned with the Node runtime we actually run (24.x).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "cargo"
    directory: "/apps/ui/src-tauri"
    schedule:
      interval: "weekly"
