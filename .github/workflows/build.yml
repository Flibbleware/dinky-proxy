name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: DinkyProxy-macOS
            artifact-path: apps/ui/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact-name: DinkyProxy-Windows
            artifact-path: |
              apps/ui/src-tauri/target/release/bundle/msi/*.msi
              apps/ui/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/ui/src-tauri

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate route tree
        working-directory: apps/ui
        run: pnpm exec tsr generate

      - name: Build frontend and Tauri app
        run: pnpm --filter ./apps/ui build && pnpm --filter ./apps/ui tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
