name: Backend

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Assurances
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/ui/src-tauri/**'

      - name: Install system dependencies
        if: steps.filter.outputs.backend == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        if: steps.filter.outputs.backend == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        if: steps.filter.outputs.backend == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/ui/src-tauri

      - name: Test
        if: steps.filter.outputs.backend == 'true'
        run: cargo test --manifest-path apps/ui/src-tauri/Cargo.toml

      - name: Lint
        if: steps.filter.outputs.backend == 'true'
        run: cargo clippy --manifest-path apps/ui/src-tauri/Cargo.toml

      - name: Format check
        if: steps.filter.outputs.backend == 'true'
        run: cargo fmt --manifest-path apps/ui/src-tauri/Cargo.toml --check
