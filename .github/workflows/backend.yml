name: Backend

on:
  pull_request:
    paths:
      - 'apps/ui/src-tauri/**'
  push:
    branches:
      - main
    paths:
      - 'apps/ui/src-tauri/**'

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/ui/src-tauri

      - name: Test
        run: cargo test --manifest-path apps/ui/src-tauri/Cargo.toml

      - name: Lint
        run: cargo clippy --manifest-path apps/ui/src-tauri/Cargo.toml

      - name: Format check
        run: cargo fmt --manifest-path apps/ui/src-tauri/Cargo.toml --check
