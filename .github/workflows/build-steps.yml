name: Build steps

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: Upload the built installers as run artifacts. Disabled for cache-warming runs.
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: DinkyProxy-macOS
            artifact-path: apps/ui/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            artifact-name: DinkyProxy-Windows
            artifact-path: |
              apps/ui/src-tauri/target/release/bundle/msi/*.msi
              apps/ui/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          workspaces: apps/ui/src-tauri
          shared-key: tauri-build

      - name: Install PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate route tree
        working-directory: apps/ui
        run: pnpm exec tsr generate

      - name: Build frontend and Tauri app
        run: pnpm --filter ./apps/ui build && pnpm --filter ./apps/ui tauri:build

      - name: Upload build artifacts
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
